services:
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hickory-backend-api
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_RUNNING_IN_CONTAINER=true
    restart: unless-stopped

  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hickory-frontend-app
    ports:
      - "4200:80"
    depends_on:
      - backend-api
    restart: unless-stopped
