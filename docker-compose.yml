services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: hickory-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=HickoryLawnCare@2026!
    volumes:
      - mssql-data:/var/opt/mssql
      - ./database:/database
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hickory-backend-api
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=HickoryLawnCare;User Id=sa;Password=HickoryLawnCare@2026!;TrustServerCertificate=True;
    depends_on:
      - db
    restart: unless-stopped

  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hickory-frontend-app
    ports:
      - "4200:80"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  mssql-data:
